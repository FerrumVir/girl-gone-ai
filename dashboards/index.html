<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girl Gone AI — Dashboard Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2e3a;
    --text: #e4e6eb;
    --text-muted: #8b8fa3;
    --accent: #6366f1;
    --accent-hover: #5558e6;
    --red: #ef4444;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    text-align: center;
  }
  .logo { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
  .logo span { color: var(--accent); }
  .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
  .field { margin-bottom: 16px; text-align: left; }
  .field label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
  .field input {
    width: 100%; padding: 12px 16px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 15px; font-family: var(--font);
    outline: none; transition: border-color .2s;
  }
  .field input:focus { border-color: var(--accent); }
  .error { color: var(--red); font-size: 13px; margin-bottom: 12px; display: none; }
  .btn {
    width: 100%; padding: 14px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: var(--font); transition: background .2s;
    margin-top: 8px;
  }
  .btn:hover { background: var(--accent-hover); }
  .footer-text { margin-top: 24px; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">Girl Gone <span>AI</span></div>
  <div class="subtitle">Sign in to your dashboard</div>
  <div class="error" id="err">Invalid email or password.</div>
  <form id="login-form">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@novolinkai.com" autocomplete="email" autofocus required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
  <div class="footer-text">Factory 1 Dashboard &mdash; NovoClaw</div>
</div>
<script>
const USERS = [
  { email: 'jaci@novolinkai.com', hash: '3d96780287c0667c8ad94d2409d758fe5d942fce3b3b7dff9098bc1af2647126', role: 'jaci', redirect: 'jaci.html' },
  { email: 'kenny@novolinkai.com', hash: '3d96780287c0667c8ad94d2409d758fe5d942fce3b3b7dff9098bc1af2647126', role: 'owner', redirect: 'owner.html' }
];
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pw = document.getElementById('password').value;
  const hash = await sha256(pw);
  const user = USERS.find(u => u.email === email && u.hash === hash);
  if (user) {
    sessionStorage.setItem('dash-role', user.role);
    sessionStorage.setItem('dash-email', user.email);
    window.location.href = user.redirect;
  } else {
    document.getElementById('err').style.display = 'block';
  }
});
</script>
</body>
</html>
