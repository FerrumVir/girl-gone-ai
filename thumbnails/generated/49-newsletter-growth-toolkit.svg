<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_49_newsletter_growth_toolkit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_49_newsletter_growth_toolkit" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#F59E0B" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_49_newsletter_growth_toolkit)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_49_newsletter_growth_toolkit)"/>

  <!-- Decorative elements -->
  <g>
    <line x1="77" y1="141" x2="108" y2="141" stroke="#F59E0B" stroke-width="2" opacity="0.07774164856358852" marker-end="url(#arrowhead)"/>
    <line x1="154" y1="337" x2="223" y2="337" stroke="#F59E0B" stroke-width="2" opacity="0.13085484153279914" marker-end="url(#arrowhead)"/>
    <line x1="356" y1="110" x2="430" y2="110" stroke="#F59E0B" stroke-width="2" opacity="0.10273297129550235" marker-end="url(#arrowhead)"/>
    <line x1="128" y1="209" x2="163" y2="209" stroke="#F59E0B" stroke-width="2" opacity="0.10844841895507884" marker-end="url(#arrowhead)"/>
    <line x1="379" y1="86" x2="424" y2="86" stroke="#F59E0B" stroke-width="2" opacity="0.13101083693040516" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="145" height="28" rx="6" fill="#F59E0B" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#F59E0B" letter-spacing="1.5" text-transform="uppercase">Workflow Kits</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#F59E0B" opacity="0.4">⚙</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Newsletter Growth &amp;</tspan>
      <tspan x="300" dy="34">Monetization Toolkit</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#F59E0B" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>