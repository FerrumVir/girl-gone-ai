<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_106_thesis_writing_planner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_106_thesis_writing_planner" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FF3B8B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#FF3B8B" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_106_thesis_writing_planner)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_106_thesis_writing_planner)"/>

  <!-- Decorative elements -->
  <g>
    <circle cx="356" cy="180" r="33" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.04388734494391235"/>
    <circle cx="391" cy="351" r="28" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.06728202852668584"/>
    <circle cx="350" cy="160" r="26" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.08005663771040825"/>
    <circle cx="194" cy="142" r="23" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.06027926594173577"/>
    <circle cx="365" cy="352" r="33" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.08735392372407708"/>
    <circle cx="233" cy="274" r="35" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.0828680011254232"/>
    <circle cx="157" cy="96" r="23" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.1114836888139652"/>
    <circle cx="506" cy="128" r="15" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.1005366784000156"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#FF3B8B" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#FF3B8B" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#FF3B8B" letter-spacing="1.5" text-transform="uppercase">Digital Planners</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#FF3B8B" opacity="0.4">☆</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Thesis &amp; Research Writing</tspan>
      <tspan x="300" dy="34">Planner</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#FF3B8B" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>