  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_61_podcast_guest_outreach_system)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_61_podcast_guest_outreach_system)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="372" y="261" width="47" height="25" rx="6" fill="#A855F7" opacity="0.13289166759661813" transform="rotate(-18 395 273)"/>
    <rect x="190" y="64" width="38" height="42" rx="6" fill="#A855F7" opacity="0.11418222567581186" transform="rotate(-3 209 85)"/>
    <rect x="311" y="156" width="29" height="34" rx="6" fill="#A855F7" opacity="0.08843525616370779" transform="rotate(-24 325 173)"/>
    <rect x="513" y="204" width="40" height="30" rx="6" fill="#A855F7" opacity="0.08420354484705966" transform="rotate(26 533 219)"/>
    <rect x="41" y="162" width="43" height="40" rx="6" fill="#A855F7" opacity="0.13868119359192155" transform="rotate(10 62 182)"/>
    <rect x="315" y="141" width="22" height="26" rx="6" fill="#A855F7" opacity="0.07391750667141563" transform="rotate(-26 326 154)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.2"/>

