  <!-- Decorative elements -->
  <g>
    <rect x="253" y="180" width="23" height="23" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.054007167356624045" transform="rotate(57 264 191)"/>
    <rect x="455" y="183" width="15" height="15" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.14306148204157335" transform="rotate(56 462 190)"/>
    <rect x="433" y="311" width="20" height="20" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.05886084922196967" transform="rotate(85 443 321)"/>
    <rect x="191" y="286" width="17" height="17" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.14355370804593826" transform="rotate(51 199 294)"/>
    <rect x="414" y="133" width="12" height="12" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.05627216730034904" transform="rotate(69 420 139)"/>
    <rect x="337" y="213" width="25" height="25" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.061427811445082775" transform="rotate(78 349 225)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>

