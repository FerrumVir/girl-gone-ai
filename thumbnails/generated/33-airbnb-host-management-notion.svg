  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_33_airbnb_host_management_notion)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="374" y="143" width="25" height="32" rx="6" fill="#A855F7" opacity="0.13210956997230955" transform="rotate(16 386 159)"/>
    <rect x="248" y="194" width="22" height="27" rx="6" fill="#A855F7" opacity="0.052134174943507854" transform="rotate(-22 259 207)"/>
    <rect x="492" y="279" width="23" height="20" rx="6" fill="#A855F7" opacity="0.14883293038383527" transform="rotate(-10 503 289)"/>
    <rect x="30" y="240" width="42" height="32" rx="6" fill="#A855F7" opacity="0.05319721938461156" transform="rotate(7 51 256)"/>
    <rect x="419" y="227" width="21" height="35" rx="6" fill="#A855F7" opacity="0.0667997189437487" transform="rotate(-28 429 244)"/>
    <rect x="66" y="76" width="31" height="43" rx="6" fill="#A855F7" opacity="0.14306183228487301" transform="rotate(-15 81 97)"/>
