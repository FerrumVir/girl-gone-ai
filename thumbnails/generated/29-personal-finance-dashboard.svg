<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_29_personal_finance_dashboard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_29_personal_finance_dashboard" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#10B981" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_29_personal_finance_dashboard)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_29_personal_finance_dashboard)"/>

  <!-- Decorative elements -->
  <g>
    <line x1="189" y1="136" x2="189" y2="263" stroke="#10B981" stroke-width="1" opacity="0.08869112844084563"/>
    <line x1="391" y1="134" x2="391" y2="309" stroke="#10B981" stroke-width="1" opacity="0.11274715082818815"/>
    <line x1="463" y1="82" x2="463" y2="325" stroke="#10B981" stroke-width="1" opacity="0.09178743745362178"/>
    <line x1="153" y1="107" x2="153" y2="304" stroke="#10B981" stroke-width="1" opacity="0.08170468960128194"/>
    <line x1="31" y1="107" x2="538" y2="107" stroke="#059669" stroke-width="1" opacity="0.08728505025036676"/>
    <line x1="64" y1="135" x2="531" y2="135" stroke="#059669" stroke-width="1" opacity="0.07370544313494283"/>
    <line x1="33" y1="246" x2="545" y2="246" stroke="#059669" stroke-width="1" opacity="0.06020130723218722"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#10B981" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="181" height="28" rx="6" fill="#10B981" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#10B981" letter-spacing="1.5" text-transform="uppercase">Spreadsheet Tools</text>

  <!-- Icon -->
  <text x="300" y="167" text-anchor="middle" font-size="48" fill="#10B981" opacity="0.4">☰</text>

  <!-- Product title -->
  <text x="300" y="217" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Personal Finance Dashboard</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#10B981" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>