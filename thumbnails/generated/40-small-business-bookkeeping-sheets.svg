<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_40_small_business_bookkeeping_sheets" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_40_small_business_bookkeeping_sheets" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#10B981" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_40_small_business_bookkeeping_sheets)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_40_small_business_bookkeeping_sheets)"/>

  <!-- Decorative elements -->
  <g>
    <line x1="505" y1="112" x2="505" y2="357" stroke="#10B981" stroke-width="1" opacity="0.11903461237173402"/>
    <line x1="378" y1="131" x2="378" y2="273" stroke="#10B981" stroke-width="1" opacity="0.09668191530989377"/>
    <line x1="280" y1="131" x2="280" y2="309" stroke="#10B981" stroke-width="1" opacity="0.08837848189176538"/>
    <line x1="329" y1="143" x2="329" y2="257" stroke="#10B981" stroke-width="1" opacity="0.1014537303043117"/>
    <line x1="71" y1="123" x2="537" y2="123" stroke="#059669" stroke-width="1" opacity="0.062017944270191895"/>
    <line x1="34" y1="131" x2="549" y2="131" stroke="#059669" stroke-width="1" opacity="0.11958047276301267"/>
    <line x1="48" y1="336" x2="571" y2="336" stroke="#059669" stroke-width="1" opacity="0.07399801852973063"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#10B981" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="181" height="28" rx="6" fill="#10B981" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#10B981" letter-spacing="1.5" text-transform="uppercase">Spreadsheet Tools</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#10B981" opacity="0.4">☰</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Small Business Bookkeeping</tspan>
      <tspan x="300" dy="34">System</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#10B981" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>