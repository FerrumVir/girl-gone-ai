<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_41_digital_declutter_system_notion" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_41_digital_declutter_system_notion" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#A855F7" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_41_digital_declutter_system_notion)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_41_digital_declutter_system_notion)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="532" y="146" width="31" height="41" rx="6" fill="#A855F7" opacity="0.14626641475230995" transform="rotate(-1 547 166)"/>
    <rect x="312" y="319" width="31" height="40" rx="6" fill="#A855F7" opacity="0.11094730843864113" transform="rotate(-28 327 339)"/>
    <rect x="262" y="196" width="30" height="27" rx="6" fill="#A855F7" opacity="0.09932201196066885" transform="rotate(-2 277 209)"/>
    <rect x="78" y="90" width="27" height="42" rx="6" fill="#A855F7" opacity="0.07258313966112451" transform="rotate(-1 91 111)"/>
    <rect x="199" y="205" width="28" height="37" rx="6" fill="#A855F7" opacity="0.0802816307038433" transform="rotate(14 213 223)"/>
    <rect x="374" y="72" width="43" height="26" rx="6" fill="#A855F7" opacity="0.1075067293876881" transform="rotate(-16 395 85)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#A855F7" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#A855F7" letter-spacing="1.5" text-transform="uppercase">Notion Templates</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#A855F7" opacity="0.4">⬛</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Digital Declutter &amp;</tspan>
      <tspan x="300" dy="34">Organization System</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#A855F7" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>