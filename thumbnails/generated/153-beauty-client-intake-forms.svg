  <!-- Decorative elements -->
  <g>
    <rect x="54" y="219" width="200" height="7" rx="2" fill="#6366F1" opacity="0.0822855538378156"/>
    <rect x="97" y="310" width="79" height="10" rx="2" fill="#6366F1" opacity="0.0739430530350005"/>
    <rect x="39" y="143" width="104" height="9" rx="2" fill="#6366F1" opacity="0.09779014905893654"/>
    <rect x="96" y="97" width="195" height="10" rx="2" fill="#6366F1" opacity="0.13734601066734065"/>
    <rect x="82" y="100" width="173" height="9" rx="2" fill="#6366F1" opacity="0.0943020570660093"/>
  </g>

  <!-- Border -->
