<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_128_youtube_script_templates" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_128_youtube_script_templates" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#6366F1" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_128_youtube_script_templates)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_128_youtube_script_templates)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="63" y="182" width="149" height="7" rx="2" fill="#6366F1" opacity="0.09470394369216513"/>
    <rect x="79" y="84" width="174" height="4" rx="2" fill="#6366F1" opacity="0.11288132886832919"/>
    <rect x="53" y="332" width="154" height="4" rx="2" fill="#6366F1" opacity="0.1290119250222678"/>
    <rect x="33" y="236" width="106" height="10" rx="2" fill="#6366F1" opacity="0.08919646410875909"/>
    <rect x="31" y="169" width="190" height="4" rx="2" fill="#6366F1" opacity="0.1284880687288008"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="190" height="28" rx="6" fill="#6366F1" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#6366F1" letter-spacing="1.5" text-transform="uppercase">Business Templates</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#6366F1" opacity="0.4">△</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">YouTube Script Writing</tspan>
      <tspan x="300" dy="34">Templates</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#6366F1" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>