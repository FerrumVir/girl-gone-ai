  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_43_rental_property_manager_notion)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="337" y="252" width="44" height="44" rx="6" fill="#A855F7" opacity="0.06000557706141536" transform="rotate(-24 359 274)"/>
    <rect x="524" y="195" width="43" height="25" rx="6" fill="#A855F7" opacity="0.07932282190696335" transform="rotate(-20 545 207)"/>
    <rect x="418" y="236" width="30" height="38" rx="6" fill="#A855F7" opacity="0.10941760562477668" transform="rotate(-16 433 255)"/>
    <rect x="264" y="296" width="30" height="43" rx="6" fill="#A855F7" opacity="0.08698496276097217" transform="rotate(-29 279 317)"/>
    <rect x="64" y="281" width="30" height="40" rx="6" fill="#A855F7" opacity="0.1462376362492505" transform="rotate(25 79 301)"/>
    <rect x="237" y="159" width="38" height="34" rx="6" fill="#A855F7" opacity="0.10368241229358907" transform="rotate(-26 256 176)"/>
  </g>

