<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_72_notion_life_os_dashboard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_72_notion_life_os_dashboard" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#A855F7" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_72_notion_life_os_dashboard)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_72_notion_life_os_dashboard)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="284" y="203" width="45" height="38" rx="6" fill="#A855F7" opacity="0.1422945147887302" transform="rotate(30 306 222)"/>
    <rect x="250" y="219" width="37" height="38" rx="6" fill="#A855F7" opacity="0.07000154741532767" transform="rotate(21 268 238)"/>
    <rect x="323" y="302" width="36" height="46" rx="6" fill="#A855F7" opacity="0.08065601368238373" transform="rotate(-29 341 325)"/>
    <rect x="475" y="265" width="46" height="23" rx="6" fill="#A855F7" opacity="0.14459648991840163" transform="rotate(-30 498 276)"/>
    <rect x="431" y="101" width="21" height="26" rx="6" fill="#A855F7" opacity="0.07804642054754085" transform="rotate(-15 441 114)"/>
    <rect x="323" y="244" width="50" height="30" rx="6" fill="#A855F7" opacity="0.1268179066032354" transform="rotate(-2 348 259)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#A855F7" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#A855F7" letter-spacing="1.5" text-transform="uppercase">Notion Templates</text>

  <!-- Icon -->
  <text x="300" y="167" text-anchor="middle" font-size="48" fill="#A855F7" opacity="0.4">⬛</text>

  <!-- Product title -->
  <text x="300" y="217" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Notion Life OS Dashboard</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#A855F7" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>