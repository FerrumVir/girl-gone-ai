<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_60_social_media_canva_templates" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_60_social_media_canva_templates" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#8B5CF6" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_60_social_media_canva_templates)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_60_social_media_canva_templates)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="155" y="95" width="17" height="17" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.10628735096510655" transform="rotate(68 163 103)"/>
    <rect x="458" y="231" width="17" height="17" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.10702012877704997" transform="rotate(58 466 239)"/>
    <rect x="528" y="205" width="11" height="11" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.13159688491380567" transform="rotate(80 533 210)"/>
    <rect x="435" y="268" width="25" height="25" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.12435859821985061" transform="rotate(67 447 280)"/>
    <rect x="317" y="149" width="13" height="13" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.06709020080775789" transform="rotate(81 323 155)"/>
    <rect x="186" y="237" width="18" height="18" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.1089177997742847" transform="rotate(57 195 246)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#8B5CF6" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6" letter-spacing="1.5" text-transform="uppercase">Digital Products</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#8B5CF6" opacity="0.4">◆</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Social Media Canva Template</tspan>
      <tspan x="300" dy="34">Collection</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#8B5CF6" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>