  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_46_wedding_budget_planner_sheets)"/>

  <!-- Decorative elements -->
  <g>
    <line x1="422" y1="120" x2="422" y2="328" stroke="#10B981" stroke-width="1" opacity="0.09838004615232489"/>
    <line x1="313" y1="75" x2="313" y2="335" stroke="#10B981" stroke-width="1" opacity="0.11461417345076572"/>
    <line x1="352" y1="94" x2="352" y2="349" stroke="#10B981" stroke-width="1" opacity="0.07796630316891942"/>
    <line x1="537" y1="108" x2="537" y2="258" stroke="#10B981" stroke-width="1" opacity="0.0714276833093938"/>
    <line x1="44" y1="286" x2="541" y2="286" stroke="#059669" stroke-width="1" opacity="0.06142107769247218"/>
    <line x1="78" y1="217" x2="519" y2="217" stroke="#059669" stroke-width="1" opacity="0.10460457667560648"/>
    <line x1="78" y1="337" x2="552" y2="337" stroke="#059669" stroke-width="1" opacity="0.06129443784181255"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#10B981" stroke-width="1" opacity="0.2"/>

