<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_10_habit_streak_tracker_sheets" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_10_habit_streak_tracker_sheets" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#10B981" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_10_habit_streak_tracker_sheets)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_10_habit_streak_tracker_sheets)"/>

  <!-- Decorative elements -->
  <g>
    <line x1="514" y1="89" x2="514" y2="324" stroke="#10B981" stroke-width="1" opacity="0.09527068416625659"/>
    <line x1="164" y1="145" x2="164" y2="283" stroke="#10B981" stroke-width="1" opacity="0.11579727620881688"/>
    <line x1="367" y1="150" x2="367" y2="310" stroke="#10B981" stroke-width="1" opacity="0.06256865907951617"/>
    <line x1="403" y1="130" x2="403" y2="346" stroke="#10B981" stroke-width="1" opacity="0.07263552501566925"/>
    <line x1="81" y1="151" x2="538" y2="151" stroke="#059669" stroke-width="1" opacity="0.11253245549202655"/>
    <line x1="61" y1="160" x2="511" y2="160" stroke="#059669" stroke-width="1" opacity="0.06448462791005653"/>
    <line x1="77" y1="105" x2="551" y2="105" stroke="#059669" stroke-width="1" opacity="0.08375421129014085"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#10B981" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="181" height="28" rx="6" fill="#10B981" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#10B981" letter-spacing="1.5" text-transform="uppercase">Spreadsheet Tools</text>

  <!-- Icon -->
  <text x="300" y="167" text-anchor="middle" font-size="48" fill="#10B981" opacity="0.4">☰</text>

  <!-- Product title -->
  <text x="300" y="217" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Habit Streak Tracker</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#10B981" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>