<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_15_therapist_client_planner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_15_therapist_client_planner" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#8B5CF6" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_15_therapist_client_planner)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_15_therapist_client_planner)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="387" y="211" width="23" height="23" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.10798858250315382" transform="rotate(74 398 222)"/>
    <rect x="61" y="228" width="15" height="15" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.09433740623950465" transform="rotate(72 68 235)"/>
    <rect x="181" y="192" width="14" height="14" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.14043485197321426" transform="rotate(86 188 199)"/>
    <rect x="318" y="195" width="18" height="18" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.07268927866002492" transform="rotate(59 327 204)"/>
    <rect x="56" y="214" width="11" height="11" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.09062220691175576" transform="rotate(57 61 219)"/>
    <rect x="297" y="73" width="13" height="13" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.12929465982138505" transform="rotate(56 303 79)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#8B5CF6" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6" letter-spacing="1.5" text-transform="uppercase">Digital Products</text>

  <!-- Icon -->
  <text x="300" y="167" text-anchor="middle" font-size="48" fill="#8B5CF6" opacity="0.4">◆</text>

  <!-- Product title -->
  <text x="300" y="217" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Therapist Practice Manager</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#8B5CF6" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>