  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_68_airbnb_pricing_strategy_spreadsheet)"/>

  <!-- Decorative elements -->
  <g>
    <line x1="219" y1="130" x2="219" y2="321" stroke="#10B981" stroke-width="1" opacity="0.10591900617286557"/>
    <line x1="477" y1="71" x2="477" y2="288" stroke="#10B981" stroke-width="1" opacity="0.06393963395539021"/>
    <line x1="401" y1="83" x2="401" y2="261" stroke="#10B981" stroke-width="1" opacity="0.10103919375007578"/>
    <line x1="373" y1="101" x2="373" y2="296" stroke="#10B981" stroke-width="1" opacity="0.0898335625098742"/>
    <line x1="88" y1="294" x2="559" y2="294" stroke="#059669" stroke-width="1" opacity="0.11089072247738094"/>
    <line x1="51" y1="234" x2="500" y2="234" stroke="#059669" stroke-width="1" opacity="0.0887345443993189"/>
    <line x1="74" y1="286" x2="552" y2="286" stroke="#059669" stroke-width="1" opacity="0.09425189125771721"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#10B981" stroke-width="1" opacity="0.2"/>

