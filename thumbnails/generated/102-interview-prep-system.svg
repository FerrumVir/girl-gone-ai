      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_102_interview_prep_system" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
