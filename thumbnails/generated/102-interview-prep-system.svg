  <rect x="24" y="24" width="172" height="28" rx="6" fill="#14B8A6" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#14B8A6" letter-spacing="1.5" text-transform="uppercase">Career Templates</text>

