  <!-- Decorative elements -->
  <g>
    <path d="M231,101 h30 v-29 h30 v-29 h30 v-29 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.08748069301450867"/>
    <path d="M85,104 h35 v-21 h35 v-21 h35 v-21 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.13074837238220272"/>
    <path d="M448,137 h37 v-27 h37 v-27 h37 v-27 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.09541958336034195"/>
    <path d="M274,268 h33 v-18 h33 v-18 h33 v-18 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.0977968355733555"/>
    <path d="M446,193 h35 v-21 h35 v-21 h35 v-21 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.08489163925050741"/>
  </g>

