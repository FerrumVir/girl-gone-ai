<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_57_travel_planning_dashboard_notion" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_57_travel_planning_dashboard_notion" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#A855F7" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_57_travel_planning_dashboard_notion)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_57_travel_planning_dashboard_notion)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="521" y="217" width="34" height="43" rx="6" fill="#A855F7" opacity="0.1133889953692729" transform="rotate(-30 538 238)"/>
    <rect x="427" y="204" width="42" height="40" rx="6" fill="#A855F7" opacity="0.12688183981708778" transform="rotate(-7 448 224)"/>
    <rect x="409" y="82" width="34" height="45" rx="6" fill="#A855F7" opacity="0.06828761124943246" transform="rotate(-6 426 104)"/>
    <rect x="93" y="224" width="26" height="45" rx="6" fill="#A855F7" opacity="0.12900404538966226" transform="rotate(-2 106 246)"/>
    <rect x="526" y="112" width="49" height="38" rx="6" fill="#A855F7" opacity="0.14476088848246582" transform="rotate(17 550 131)"/>
    <rect x="81" y="158" width="35" height="43" rx="6" fill="#A855F7" opacity="0.12948015997781442" transform="rotate(-5 98 179)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
