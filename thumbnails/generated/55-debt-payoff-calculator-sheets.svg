<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_55_debt_payoff_calculator_sheets" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_55_debt_payoff_calculator_sheets" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#10B981" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_55_debt_payoff_calculator_sheets)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_55_debt_payoff_calculator_sheets)"/>

  <!-- Decorative elements -->
  <g>
    <line x1="283" y1="142" x2="283" y2="299" stroke="#10B981" stroke-width="1" opacity="0.10611154067314374"/>
    <line x1="197" y1="143" x2="197" y2="335" stroke="#10B981" stroke-width="1" opacity="0.07293049605901787"/>
    <line x1="333" y1="80" x2="333" y2="348" stroke="#10B981" stroke-width="1" opacity="0.08666727059965165"/>
    <line x1="338" y1="69" x2="338" y2="251" stroke="#10B981" stroke-width="1" opacity="0.07885020450674916"/>
    <line x1="99" y1="329" x2="504" y2="329" stroke="#059669" stroke-width="1" opacity="0.10833730445433792"/>
    <line x1="45" y1="100" x2="545" y2="100" stroke="#059669" stroke-width="1" opacity="0.0764685148543467"/>
    <line x1="92" y1="138" x2="510" y2="138" stroke="#059669" stroke-width="1" opacity="0.09622483034005486"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#10B981" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="181" height="28" rx="6" fill="#10B981" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#10B981" letter-spacing="1.5" text-transform="uppercase">Spreadsheet Tools</text>

  <!-- Icon -->
  <text x="300" y="167" text-anchor="middle" font-size="48" fill="#10B981" opacity="0.4">☰</text>

  <!-- Product title -->
  <text x="300" y="217" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Debt Payoff Calculator</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#10B981" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>