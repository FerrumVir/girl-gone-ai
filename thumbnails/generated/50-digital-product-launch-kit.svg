<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_50_digital_product_launch_kit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_50_digital_product_launch_kit" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#8B5CF6" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_50_digital_product_launch_kit)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_50_digital_product_launch_kit)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="397" y="326" width="13" height="13" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.06875098541051351" transform="rotate(90 403 332)"/>
    <rect x="391" y="168" width="17" height="17" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.10452629890173859" transform="rotate(49 399 176)"/>
    <rect x="133" y="145" width="17" height="17" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.05762380458824236" transform="rotate(79 141 153)"/>
    <rect x="145" y="289" width="22" height="22" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.09750989322547171" transform="rotate(87 156 300)"/>
    <rect x="344" y="208" width="24" height="24" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.07736937205827435" transform="rotate(52 356 220)"/>
    <rect x="512" y="95" width="25" height="25" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.14334769744061124" transform="rotate(72 524 107)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#8B5CF6" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6" letter-spacing="1.5" text-transform="uppercase">Digital Products</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#8B5CF6" opacity="0.4">◆</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Digital Product Launch</tspan>
      <tspan x="300" dy="34">System</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#8B5CF6" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>