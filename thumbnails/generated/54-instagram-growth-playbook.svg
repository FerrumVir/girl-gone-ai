<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_54_instagram_growth_playbook" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_54_instagram_growth_playbook" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#F59E0B" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_54_instagram_growth_playbook)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_54_instagram_growth_playbook)"/>

  <!-- Decorative elements -->
  <g>
    <line x1="374" y1="90" x2="441" y2="90" stroke="#F59E0B" stroke-width="2" opacity="0.11960752263305018" marker-end="url(#arrowhead)"/>
    <line x1="221" y1="296" x2="270" y2="296" stroke="#F59E0B" stroke-width="2" opacity="0.10390536259615499" marker-end="url(#arrowhead)"/>
    <line x1="76" y1="277" x2="107" y2="277" stroke="#F59E0B" stroke-width="2" opacity="0.087799696381595" marker-end="url(#arrowhead)"/>
    <line x1="247" y1="121" x2="283" y2="121" stroke="#F59E0B" stroke-width="2" opacity="0.09248670239595316" marker-end="url(#arrowhead)"/>
    <line x1="66" y1="316" x2="96" y2="316" stroke="#F59E0B" stroke-width="2" opacity="0.0735319148211628" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="145" height="28" rx="6" fill="#F59E0B" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#F59E0B" letter-spacing="1.5" text-transform="uppercase">Workflow Kits</text>

  <!-- Icon -->
  <text x="300" y="167" text-anchor="middle" font-size="48" fill="#F59E0B" opacity="0.4">⚙</text>

  <!-- Product title -->
  <text x="300" y="217" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Instagram Growth Playbook</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#F59E0B" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>