<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_16_fitness_coach_planner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_16_fitness_coach_planner" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FF3B8B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#FF3B8B" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_16_fitness_coach_planner)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_16_fitness_coach_planner)"/>

  <!-- Decorative elements -->
  <g>
    <circle cx="565" cy="307" r="29" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.051971358327550496"/>
    <circle cx="115" cy="187" r="27" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.06066115249606217"/>
    <circle cx="374" cy="315" r="13" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.04305665369836663"/>
    <circle cx="317" cy="172" r="27" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.05823884076081398"/>
    <circle cx="556" cy="351" r="18" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.11007578745767851"/>
    <circle cx="483" cy="333" r="23" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.0824884589550604"/>
    <circle cx="247" cy="88" r="35" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.08551193608282276"/>
    <circle cx="536" cy="229" r="13" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.07302368313158372"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#FF3B8B" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#FF3B8B" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#FF3B8B" letter-spacing="1.5" text-transform="uppercase">Digital Planners</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#FF3B8B" opacity="0.4">☆</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Fitness Coach Business</tspan>
      <tspan x="300" dy="34">Planner</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#FF3B8B" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>