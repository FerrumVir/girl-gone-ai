    <path d="M51,294 h26 v-21 h26 v-21 h26 v-21 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.07243657489856245"/>
    <path d="M420,257 h39 v-24 h39 v-24 h39 v-24 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.07461136541763681"/>
