  <g>
    <path d="M95,283 h37 v-25 h37 v-25 h37 v-25 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.12928771047669066"/>
    <path d="M173,169 h24 v-28 h24 v-28 h24 v-28 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.10518036856204485"/>
