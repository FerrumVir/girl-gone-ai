  <g>
    <rect x="51" y="117" width="42" height="30" rx="6" fill="#A855F7" opacity="0.1255232718933335" transform="rotate(14 72 132)"/>
    <rect x="294" y="111" width="42" height="26" rx="6" fill="#A855F7" opacity="0.13033121500006928" transform="rotate(25 315 124)"/>
