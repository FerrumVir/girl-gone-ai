    <rect x="156" y="316" width="32" height="38" rx="6" fill="#A855F7" opacity="0.12901195741923688" transform="rotate(11 172 335)"/>
    <rect x="468" y="134" width="41" height="28" rx="6" fill="#A855F7" opacity="0.1398001198772718" transform="rotate(7 488 148)"/>
