<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_101_resume_builder_kit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_101_resume_builder_kit" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#14B8A6" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_101_resume_builder_kit)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_101_resume_builder_kit)"/>

  <!-- Decorative elements -->
  <g>
    <path d="M210,125 h40 v-24 h40 v-24 h40 v-24 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.06935243363319811"/>
    <path d="M281,226 h27 v-20 h27 v-20 h27 v-20 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.11272536269860277"/>
    <path d="M205,104 h30 v-17 h30 v-17 h30 v-17 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.11673633784184306"/>
    <path d="M412,126 h32 v-16 h32 v-16 h32 v-16 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.10354450378069205"/>
    <path d="M175,161 h29 v-30 h29 v-30 h29 v-30 " fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.1191937707867341"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#14B8A6" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#14B8A6" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#14B8A6" letter-spacing="1.5" text-transform="uppercase">Career Templates</text>

  <!-- Icon -->
  <text x="300" y="167" text-anchor="middle" font-size="48" fill="#14B8A6" opacity="0.4">↑</text>

  <!-- Product title -->
  <text x="300" y="217" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Resume Builder Kit</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#14B8A6" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>