  <!-- Decorative elements -->
  <g>
    <rect x="287" y="72" width="37" height="32" rx="6" fill="#A855F7" opacity="0.12650350514438408" transform="rotate(8 305 88)"/>
    <rect x="215" y="85" width="39" height="40" rx="6" fill="#A855F7" opacity="0.10626872754313768" transform="rotate(18 234 105)"/>
    <rect x="57" y="277" width="49" height="44" rx="6" fill="#A855F7" opacity="0.10028599476076525" transform="rotate(-24 81 299)"/>
    <rect x="462" y="314" width="50" height="44" rx="6" fill="#A855F7" opacity="0.07064741951572823" transform="rotate(-17 487 336)"/>
    <rect x="507" y="186" width="39" height="50" rx="6" fill="#A855F7" opacity="0.10042154317061935" transform="rotate(-21 526 211)"/>
    <rect x="154" y="101" width="40" height="48" rx="6" fill="#A855F7" opacity="0.10883464378111002" transform="rotate(-22 174 125)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.2"/>

