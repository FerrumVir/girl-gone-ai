<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_36_freelance_contract_templates" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_36_freelance_contract_templates" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#F59E0B" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_36_freelance_contract_templates)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_36_freelance_contract_templates)"/>

  <!-- Decorative elements -->
  <g>
    <line x1="387" y1="105" x2="434" y2="105" stroke="#F59E0B" stroke-width="2" opacity="0.10154358916058223" marker-end="url(#arrowhead)"/>
    <line x1="202" y1="230" x2="232" y2="230" stroke="#F59E0B" stroke-width="2" opacity="0.0913999490172097" marker-end="url(#arrowhead)"/>
    <line x1="340" y1="134" x2="400" y2="134" stroke="#F59E0B" stroke-width="2" opacity="0.0670391457035849" marker-end="url(#arrowhead)"/>
    <line x1="197" y1="83" x2="277" y2="83" stroke="#F59E0B" stroke-width="2" opacity="0.10395381525978285" marker-end="url(#arrowhead)"/>
    <line x1="279" y1="275" x2="355" y2="275" stroke="#F59E0B" stroke-width="2" opacity="0.0737596700720558" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="145" height="28" rx="6" fill="#F59E0B" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#F59E0B" letter-spacing="1.5" text-transform="uppercase">Workflow Kits</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#F59E0B" opacity="0.4">⚙</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Freelance Contract &amp; Scope</tspan>
      <tspan x="300" dy="34">Template Kit</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#F59E0B" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>