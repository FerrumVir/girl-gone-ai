<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_45_weekly_meal_planner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_45_weekly_meal_planner" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#8B5CF6" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_45_weekly_meal_planner)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_45_weekly_meal_planner)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="466" y="247" width="15" height="15" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.11244359696610035" transform="rotate(59 473 254)"/>
    <rect x="338" y="293" width="21" height="21" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.09034396631636245" transform="rotate(49 348 303)"/>
    <rect x="232" y="89" width="12" height="12" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.08831135066494153" transform="rotate(55 238 95)"/>
    <rect x="242" y="181" width="20" height="20" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.06808278969701012" transform="rotate(88 252 191)"/>
    <rect x="545" y="118" width="24" height="24" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.0947879455182489" transform="rotate(83 557 130)"/>
    <rect x="257" y="266" width="20" height="20" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.0800896235673198" transform="rotate(55 267 276)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#8B5CF6" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6" letter-spacing="1.5" text-transform="uppercase">Digital Products</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#8B5CF6" opacity="0.4">◆</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Weekly Meal Planning &amp;</tspan>
      <tspan x="300" dy="34">Grocery System</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#8B5CF6" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>