<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_18_product_launch_checklist" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_18_product_launch_checklist" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#8B5CF6" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_18_product_launch_checklist)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_18_product_launch_checklist)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="225" y="157" width="20" height="20" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.06865444573087295" transform="rotate(77 235 167)"/>
    <rect x="132" y="190" width="11" height="11" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.08061947848748133" transform="rotate(76 137 195)"/>
    <rect x="211" y="261" width="22" height="22" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.09140746850616463" transform="rotate(50 222 272)"/>
    <rect x="515" y="214" width="13" height="13" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.062138147857418315" transform="rotate(49 521 220)"/>
    <rect x="287" y="297" width="24" height="24" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.06495780985529313" transform="rotate(90 299 309)"/>
    <rect x="305" y="146" width="22" height="22" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.09888888483970232" transform="rotate(52 316 157)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#8B5CF6" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6" letter-spacing="1.5" text-transform="uppercase">Digital Products</text>

  <!-- Icon -->
  <text x="300" y="167" text-anchor="middle" font-size="48" fill="#8B5CF6" opacity="0.4">◆</text>

  <!-- Product title -->
  <text x="300" y="217" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Product Launch Playbook</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#8B5CF6" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>