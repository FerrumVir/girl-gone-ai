<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_82_youtube_channel_growth_toolkit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_82_youtube_channel_growth_toolkit" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#8B5CF6" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_82_youtube_channel_growth_toolkit)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_82_youtube_channel_growth_toolkit)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="458" y="253" width="12" height="12" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.12943689705823075" transform="rotate(70 464 259)"/>
    <rect x="500" y="83" width="24" height="24" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.1288220772709771" transform="rotate(56 512 95)"/>
    <rect x="501" y="80" width="22" height="22" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.062266074905367355" transform="rotate(62 512 91)"/>
    <rect x="537" y="152" width="16" height="16" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.10667430252576271" transform="rotate(88 545 160)"/>
    <rect x="318" y="226" width="25" height="25" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.06618834870464792" transform="rotate(84 330 238)"/>
    <rect x="51" y="246" width="19" height="19" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.13697436791778345" transform="rotate(88 60 255)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#8B5CF6" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6" letter-spacing="1.5" text-transform="uppercase">Digital Products</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#8B5CF6" opacity="0.4">◆</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">YouTube Channel Growth</tspan>
      <tspan x="300" dy="34">Toolkit</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#8B5CF6" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>