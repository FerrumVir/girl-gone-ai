<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg_151_beauty_brand_social_templates" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="glow_151_beauty_brand_social_templates" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#8B5CF6" opacity="0.3"/>
    </marker>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="400" rx="16" fill="#0A0A14"/>

  <!-- Gradient overlay -->
  <rect width="600" height="400" rx="16" fill="url(#bg_151_beauty_brand_social_templates)"/>

  <!-- Center glow -->
  <ellipse cx="300" cy="180" rx="250" ry="180" fill="url(#glow_151_beauty_brand_social_templates)"/>

  <!-- Decorative elements -->
  <g>
    <rect x="50" y="167" width="18" height="18" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.06596336592948379" transform="rotate(81 59 176)"/>
    <rect x="84" y="286" width="20" height="20" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.14062807850660577" transform="rotate(71 94 296)"/>
    <rect x="422" y="114" width="11" height="11" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.09730545067698199" transform="rotate(52 427 119)"/>
    <rect x="340" y="241" width="12" height="12" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.06668830139291888" transform="rotate(77 346 247)"/>
    <rect x="39" y="320" width="17" height="17" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.08422864297927528" transform="rotate(49 47 328)"/>
    <rect x="437" y="275" width="13" height="13" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.1002571221572138" transform="rotate(50 443 281)"/>
  </g>

  <!-- Border -->
  <rect width="596" height="396" x="2" y="2" rx="14" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.2"/>

  <!-- Category label at top -->
  <rect x="24" y="24" width="172" height="28" rx="6" fill="#8B5CF6" opacity="0.2"/>
  <text x="38" y="43" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#8B5CF6" letter-spacing="1.5" text-transform="uppercase">Digital Products</text>

  <!-- Icon -->
  <text x="300" y="150" text-anchor="middle" font-size="48" fill="#8B5CF6" opacity="0.4">◆</text>

  <!-- Product title -->
  <text x="300" y="200" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800" fill="white">
      <tspan x="300" dy="0">Beauty Brand Social Media</tspan>
      <tspan x="300" dy="34">Template Pack</tspan>
  </text>

  <!-- Bottom line accent -->
  <line x1="200" y1="340" x2="400" y2="340" stroke="#8B5CF6" stroke-width="2" opacity="0.3"/>

  <!-- Girl Gone AI branding -->
  <text x="300" y="370" text-anchor="middle" font-family="'Poppins', 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="white" opacity="0.45" letter-spacing="3">GIRL GONE AI</text>
</svg>