<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D78"/>
      <stop offset="50%" stop-color="#E040FB"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D78"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#448AFF"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Icon: Circle with lightning bolt -->
  <circle cx="50" cy="50" r="42" fill="url(#ring-grad)" opacity="0.1"/>
  <circle cx="50" cy="50" r="36" stroke="url(#ring-grad)" stroke-width="3" fill="none" opacity="0.6"/>
  <g filter="url(#glow)">
    <path d="M56 14 L36 48 L48 48 L42 86 L64 44 L52 44 Z" fill="url(#bolt-grad)"/>
  </g>
  <!-- Sparkle accents -->
  <circle cx="82" cy="20" r="3" fill="#FF2D78" opacity="0.7"/>
  <circle cx="88" cy="14" r="1.5" fill="#E040FB" opacity="0.5"/>
  <circle cx="18" cy="78" r="2" fill="#7C4DFF" opacity="0.6"/>
  <!-- Wordmark -->
  <text x="105" y="42" font-family="'Poppins', sans-serif" font-size="32" font-weight="700" letter-spacing="0.5" fill="#0F172A">Girl Gone</text>
  <text x="105" y="78" font-family="'Poppins', sans-serif" font-size="38" font-weight="800" letter-spacing="8" fill="url(#ai-grad)">AI</text>
  <!-- Sparkle after AI -->
  <g transform="translate(195, 60)">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#E040FB" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#E040FB" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#E040FB" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#E040FB" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
