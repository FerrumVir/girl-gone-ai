<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="500" fill="#000000" />
  
  <!-- 90s Gradient Glows -->
  <defs>
    <radialGradient id="glowPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF00FF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#800080" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#800080" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF00FF" />
      <stop offset="100%" stop-color="#800080" />
    </linearGradient>
  </defs>
  
  <circle cx="250" cy="250" r="200" fill="url(#glowPink)" />
  <circle cx="150" cy="150" r="150" fill="url(#glowPurple)" />

  <!-- Abstract Tech/AI Shape (Dynamic Catalyst vibe) -->
  <!-- Geometric pattern representing interconnected nodes/intelligence -->
  <g stroke="url(#textGradient)" stroke-width="2" fill="none" opacity="0.8">
    <polygon points="250,100 350,200 300,350 200,350 150,200" />
    <circle cx="250" cy="225" r="60" stroke-dasharray="10,5" />
    <line x1="250" y1="100" x2="250" y2="350" />
    <line x1="150" y1="200" x2="350" y2="200" />
  </g>

  <!-- Text Element -->
  <text x="50%" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="url(#textGradient)" style="text-transform: uppercase; letter-spacing: 4px;">
    GIRL GONE AI
  </text>
  
  <!-- 90s Cyber Accents -->
  <rect x="100" y="460" width="300" height="2" fill="url(#textGradient)" opacity="0.5" />
</svg>
