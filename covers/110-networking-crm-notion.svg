<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.3)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#overlay)"/>
  <!-- Decorative circles -->
  <circle cx="1100" cy="150" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="180" cy="550" r="150" fill="rgba(255,255,255,0.05)"/>
  <!-- Emoji icon -->
  <text x="640" y="220" text-anchor="middle" font-size="80" fill="white">🤝</text>
  <!-- Product name -->
  <text x="640" y="380" text-anchor="middle" font-family="sans-serif" font-size="60" font-weight="700" fill="white">Networking</text>
  <text x="640" y="460" text-anchor="middle" font-family="sans-serif" font-size="60" font-weight="700" fill="white">CRM</text>
  <!-- Brand -->
  <text x="640" y="650" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="300" fill="rgba(255,255,255,0.7)" letter-spacing="3">GIRL GONE AI</text>
  <line x1="540" y1="670" x2="740" y2="670" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
</svg>