<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a1e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <rect width="400" height="240" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Flower/Beauty icon with lightning bolt center -->
  <circle cx="200" cy="85" r="14" fill="url(#accent)" filter="url(#glow)"/>
  <ellipse cx="200" cy="55" rx="10" ry="20" fill="none" stroke="#FF3B8B" stroke-width="2" opacity="0.7"/>
  <ellipse cx="200" cy="115" rx="10" ry="20" fill="none" stroke="#A855F7" stroke-width="2" opacity="0.7"/>
  <ellipse cx="170" cy="85" rx="20" ry="10" fill="none" stroke="#FF3B8B" stroke-width="2" opacity="0.6"/>
  <ellipse cx="230" cy="85" rx="20" ry="10" fill="none" stroke="#A855F7" stroke-width="2" opacity="0.6"/>
  <ellipse cx="178" cy="63" rx="10" ry="16" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5" transform="rotate(-45,178,63)"/>
  <ellipse cx="222" cy="63" rx="10" ry="16" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5" transform="rotate(45,222,63)"/>
  <ellipse cx="178" cy="107" rx="10" ry="16" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.5" transform="rotate(45,178,107)"/>
  <ellipse cx="222" cy="107" rx="10" ry="16" fill="none" stroke="#A855F7" stroke-width="1.5" opacity="0.5" transform="rotate(-45,222,107)"/>
  <!-- Mini lightning bolt in center -->
  <path d="M203 78 L196 88 L200 88 L198 95 L206 85 L202 85 Z" fill="white" opacity="0.9"/>
  <!-- Sparkle particles -->
  <circle cx="130" cy="55" r="2.5" fill="#FF3B8B" opacity="0.6"/>
  <circle cx="275" cy="45" r="2" fill="#A855F7" opacity="0.5"/>
  <circle cx="290" cy="115" r="3" fill="#3B82F6" opacity="0.5"/>
  <circle cx="115" cy="120" r="2" fill="#FF3B8B" opacity="0.4"/>
  <!-- Neon glow line -->
  <line x1="80" y1="160" x2="320" y2="160" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="185" text-anchor="middle" fill="white" font-family="'Poppins',-apple-system,sans-serif" font-size="16" font-weight="700" opacity="0.95">Beauty &amp; Wellness Business</text>
  <text x="200" y="210" text-anchor="middle" fill="#FF3B8B" font-family="'Poppins',-apple-system,sans-serif" font-size="10" font-weight="600" letter-spacing="3" opacity="0.7">GIRL GONE AI</text>
</svg>