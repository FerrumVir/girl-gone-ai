<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <rect width="400" height="240" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Notion-style page icon with bolt -->
  <rect x="165" y="35" width="70" height="90" rx="6" fill="none" stroke="#A855F7" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="165" y="35" width="70" height="20" rx="6" fill="url(#accent)" opacity="0.3"/>
  <!-- Page lines -->
  <line x1="178" y1="70" x2="222" y2="70" stroke="#A855F7" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="178" y1="82" x2="215" y2="82" stroke="#FF3B8B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="178" y1="94" x2="208" y2="94" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="178" y1="106" x2="220" y2="106" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Lightning bolt overlay -->
  <path d="M220 40 L212 55 L217 55 L214 68 L225 52 L219 52 Z" fill="url(#accent)" opacity="0.9" filter="url(#glow)"/>
  <!-- Floating blocks (Notion vibes) -->
  <rect x="120" y="50" width="20" height="20" rx="4" fill="none" stroke="#FF3B8B" stroke-width="1.5" opacity="0.4" transform="rotate(-10,130,60)"/>
  <rect x="260" y="60" width="18" height="18" rx="4" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.4" transform="rotate(8,269,69)"/>
  <rect x="270" y="95" width="14" height="14" rx="3" fill="#A855F7" opacity="0.2"/>
  <!-- Particles -->
  <circle cx="140" cy="100" r="2" fill="#FF3B8B" opacity="0.5"/>
  <circle cx="280" cy="45" r="2.5" fill="#3B82F6" opacity="0.5"/>
  <circle cx="125" cy="120" r="1.5" fill="#A855F7" opacity="0.4"/>
  <!-- Divider -->
  <line x1="80" y1="155" x2="320" y2="155" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="180" text-anchor="middle" fill="white" font-family="'Poppins',-apple-system,sans-serif" font-size="16" font-weight="700" opacity="0.95">Notion Templates</text>
  <text x="200" y="205" text-anchor="middle" fill="#A855F7" font-family="'Poppins',-apple-system,sans-serif" font-size="10" font-weight="600" letter-spacing="3" opacity="0.7">GIRL GONE AI</text>
</svg>