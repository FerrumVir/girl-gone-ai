<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <rect width="400" height="240" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Bar chart with neon glow -->
  <rect x="155" y="95" width="22" height="40" rx="3" fill="#FF3B8B" opacity="0.4" filter="url(#glow)"/>
  <rect x="155" y="95" width="22" height="40" rx="3" fill="none" stroke="#FF3B8B" stroke-width="1.5"/>
  <rect x="185" y="70" width="22" height="65" rx="3" fill="#A855F7" opacity="0.4" filter="url(#glow)"/>
  <rect x="185" y="70" width="22" height="65" rx="3" fill="none" stroke="#A855F7" stroke-width="1.5"/>
  <rect x="215" y="50" width="22" height="85" rx="3" fill="#3B82F6" opacity="0.4" filter="url(#glow)"/>
  <rect x="215" y="50" width="22" height="85" rx="3" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- Trend line -->
  <polyline points="148,110 176,88 206,65 240,42" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="240" cy="42" r="4" fill="white" opacity="0.9"/>
  <!-- Lightning bolt at peak -->
  <path d="M245 30 L240 40 L243 40 L241 48 L249 38 L245 38 Z" fill="url(#accent)" opacity="0.8"/>
  <!-- Base line -->
  <line x1="145" y1="135" x2="250" y2="135" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>
  <!-- Particles -->
  <circle cx="120" cy="55" r="2.5" fill="#FF3B8B" opacity="0.5"/>
  <circle cx="285" cy="65" r="2" fill="#3B82F6" opacity="0.4"/>
  <circle cx="275" cy="115" r="2" fill="#A855F7" opacity="0.4"/>
  <!-- Divider -->
  <line x1="80" y1="155" x2="320" y2="155" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="180" text-anchor="middle" fill="white" font-family="'Poppins',-apple-system,sans-serif" font-size="16" font-weight="700" opacity="0.95">Business Templates</text>
  <text x="200" y="205" text-anchor="middle" fill="#3B82F6" font-family="'Poppins',-apple-system,sans-serif" font-size="10" font-weight="600" letter-spacing="3" opacity="0.7">GIRL GONE AI</text>
</svg>