<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0a1e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <rect width="400" height="240" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Calendar/Planner icon -->
  <rect x="160" y="35" width="80" height="85" rx="8" fill="none" stroke="#A855F7" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Calendar top bar -->
  <rect x="160" y="35" width="80" height="22" rx="8" fill="url(#accent)" opacity="0.4"/>
  <!-- Calendar rings -->
  <line x1="180" y1="28" x2="180" y2="42" stroke="#FF3B8B" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="28" x2="200" y2="42" stroke="#A855F7" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="28" x2="220" y2="42" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <!-- Grid cells -->
  <rect x="170" y="65" width="14" height="14" rx="2" fill="#FF3B8B" opacity="0.3"/>
  <rect x="188" y="65" width="14" height="14" rx="2" fill="#A855F7" opacity="0.2"/>
  <rect x="206" y="65" width="14" height="14" rx="2" fill="#3B82F6" opacity="0.2"/>
  <rect x="224" y="65" width="14" height="14" rx="2" fill="#FF3B8B" opacity="0.15"/>
  <rect x="170" y="83" width="14" height="14" rx="2" fill="#A855F7" opacity="0.15"/>
  <rect x="188" y="83" width="14" height="14" rx="2" fill="url(#accent)" opacity="0.5"/>
  <rect x="206" y="83" width="14" height="14" rx="2" fill="#3B82F6" opacity="0.15"/>
  <rect x="224" y="83" width="14" height="14" rx="2" fill="#A855F7" opacity="0.2"/>
  <rect x="170" y="101" width="14" height="14" rx="2" fill="#3B82F6" opacity="0.15"/>
  <rect x="188" y="101" width="14" height="14" rx="2" fill="#FF3B8B" opacity="0.2"/>
  <!-- Lightning bolt on highlighted day -->
  <path d="M193 86 L190 91 L192 91 L191 96 L196 90 L193 90 Z" fill="white" opacity="0.9"/>
  <!-- Decorative elements -->
  <circle cx="130" cy="60" r="3" fill="#FF3B8B" opacity="0.4"/>
  <circle cx="280" cy="50" r="2" fill="#3B82F6" opacity="0.5"/>
  <circle cx="270" cy="100" r="2.5" fill="#A855F7" opacity="0.4"/>
  <!-- Divider -->
  <line x1="80" y1="150" x2="320" y2="150" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="175" text-anchor="middle" fill="white" font-family="'Poppins',-apple-system,sans-serif" font-size="16" font-weight="700" opacity="0.95">Digital Planners</text>
  <text x="200" y="200" text-anchor="middle" fill="#A855F7" font-family="'Poppins',-apple-system,sans-serif" font-size="10" font-weight="600" letter-spacing="3" opacity="0.7">GIRL GONE AI</text>
</svg>