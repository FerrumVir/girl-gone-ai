<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e081e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <rect width="400" height="240" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- 3D Package/box icon -->
  <polygon points="200,35 255,62 255,112 200,135 145,112 145,62" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linejoin="round" filter="url(#glow)"/>
  <polyline points="145,62 200,85 255,62" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="85" x2="200" y2="135" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
  <!-- Top face glow -->
  <polygon points="200,35 255,62 200,85 145,62" fill="url(#accent)" opacity="0.08"/>
  <!-- Lightning bolt download arrow -->
  <path d="M203 50 L197 65 L201 65 L198 78 L209 62 L204 62 Z" fill="url(#accent)" filter="url(#glow)"/>
  <!-- Sparkle rays from box -->
  <line x1="260" y1="55" x2="275" y2="45" stroke="#FF3B8B" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="265" y1="70" x2="280" y2="68" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="135" y1="55" x2="120" y2="48" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Particles -->
  <circle cx="110" cy="80" r="2.5" fill="#FF3B8B" opacity="0.5"/>
  <circle cx="295" cy="100" r="2" fill="#3B82F6" opacity="0.5"/>
  <circle cx="285" cy="40" r="2" fill="#A855F7" opacity="0.4"/>
  <circle cx="120" cy="120" r="1.5" fill="#FF3B8B" opacity="0.3"/>
  <!-- Divider -->
  <line x1="80" y1="155" x2="320" y2="155" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="180" text-anchor="middle" fill="white" font-family="'Poppins',-apple-system,sans-serif" font-size="16" font-weight="700" opacity="0.95">Digital Products</text>
  <text x="200" y="205" text-anchor="middle" fill="#A855F7" font-family="'Poppins',-apple-system,sans-serif" font-size="10" font-weight="600" letter-spacing="3" opacity="0.7">GIRL GONE AI</text>
</svg>