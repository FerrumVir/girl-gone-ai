<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <rect width="400" height="240" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Briefcase icon -->
  <rect x="160" y="60" width="80" height="55" rx="8" fill="none" stroke="#A855F7" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M183,60 V52 a8,8 0 0 1 8,-8 h18 a8,8 0 0 1 8,8 V60" fill="none" stroke="#FF3B8B" stroke-width="2"/>
  <line x1="160" y1="82" x2="240" y2="82" stroke="#A855F7" stroke-width="1.5" opacity="0.5"/>
  <rect x="192" y="75" width="16" height="14" rx="3" fill="url(#accent)" opacity="0.5"/>
  <!-- Lightning bolt inside clasp -->
  <path d="M202 77 L198 83 L201 83 L199 89 L205 82 L202 82 Z" fill="white" opacity="0.9"/>
  <!-- Upward arrow (career growth) -->
  <line x1="280" y1="110" x2="280" y2="50" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.5" filter="url(#glow)"/>
  <polyline points="272,60 280,50 288,60" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Step markers on arrow -->
  <circle cx="280" cy="95" r="3" fill="#FF3B8B" opacity="0.5"/>
  <circle cx="280" cy="75" r="3" fill="#A855F7" opacity="0.5"/>
  <circle cx="280" cy="55" r="3" fill="#3B82F6" opacity="0.7"/>
  <!-- Particles -->
  <circle cx="120" cy="55" r="2.5" fill="#FF3B8B" opacity="0.5"/>
  <circle cx="300" cy="40" r="2" fill="#3B82F6" opacity="0.4"/>
  <circle cx="130" cy="105" r="2" fill="#A855F7" opacity="0.4"/>
  <!-- Divider -->
  <line x1="80" y1="150" x2="320" y2="150" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="175" text-anchor="middle" fill="white" font-family="'Poppins',-apple-system,sans-serif" font-size="16" font-weight="700" opacity="0.95">Career Templates</text>
  <text x="200" y="200" text-anchor="middle" fill="#FF3B8B" font-family="'Poppins',-apple-system,sans-serif" font-size="10" font-weight="600" letter-spacing="3" opacity="0.7">GIRL GONE AI</text>
</svg>