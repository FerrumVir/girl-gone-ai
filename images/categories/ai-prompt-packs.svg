<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12081e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <rect width="400" height="240" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Chat bubble with AI spark -->
  <rect x="150" y="40" width="100" height="70" rx="12" fill="none" stroke="#A855F7" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="175,110 190,110 165,128" fill="none" stroke="#A855F7" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Typing dots with glow -->
  <circle cx="180" cy="72" r="5" fill="#FF3B8B" opacity="0.8" filter="url(#glow)"/>
  <circle cx="200" cy="72" r="5" fill="#A855F7" opacity="0.8" filter="url(#glow)"/>
  <circle cx="220" cy="72" r="5" fill="#3B82F6" opacity="0.8" filter="url(#glow)"/>
  <!-- Lightning bolt (AI) -->
  <path d="M240 35 L232 52 L237 52 L234 65 L245 48 L240 48 Z" fill="url(#accent)" filter="url(#glow)"/>
  <!-- AI spark lines radiating -->
  <line x1="260" y1="40" x2="275" y2="30" stroke="#FF3B8B" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="265" y1="55" x2="282" y2="50" stroke="#A855F7" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="258" y1="25" x2="268" y2="18" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Code-like text in bubble -->
  <text x="168" y="58" fill="#FF3B8B" font-family="monospace" font-size="8" opacity="0.5">&gt;_</text>
  <!-- Particles -->
  <circle cx="110" cy="55" r="2.5" fill="#FF3B8B" opacity="0.5"/>
  <circle cx="300" cy="90" r="2" fill="#3B82F6" opacity="0.5"/>
  <circle cx="125" cy="110" r="2" fill="#A855F7" opacity="0.4"/>
  <!-- Divider -->
  <line x1="80" y1="155" x2="320" y2="155" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="180" text-anchor="middle" fill="white" font-family="'Poppins',-apple-system,sans-serif" font-size="16" font-weight="700" opacity="0.95">AI Prompt Packs</text>
  <text x="200" y="205" text-anchor="middle" fill="#A855F7" font-family="'Poppins',-apple-system,sans-serif" font-size="10" font-weight="600" letter-spacing="3" opacity="0.7">GIRL GONE AI</text>
</svg>