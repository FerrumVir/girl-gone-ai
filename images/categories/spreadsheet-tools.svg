<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080e1a"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <rect width="400" height="240" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Spreadsheet grid -->
  <rect x="140" y="35" width="120" height="95" rx="6" fill="none" stroke="#3B82F6" stroke-width="2" filter="url(#glow)"/>
  <!-- Header row -->
  <rect x="140" y="35" width="120" height="18" rx="6" fill="url(#accent)" opacity="0.3"/>
  <!-- Column dividers -->
  <line x1="180" y1="53" x2="180" y2="130" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <line x1="220" y1="53" x2="220" y2="130" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <!-- Row dividers -->
  <line x1="140" y1="70" x2="260" y2="70" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="87" x2="260" y2="87" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="104" x2="260" y2="104" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <!-- Header text -->
  <rect x="148" y="41" width="22" height="4" rx="2" fill="#FF3B8B" opacity="0.7"/>
  <rect x="188" y="41" width="24" height="4" rx="2" fill="#A855F7" opacity="0.7"/>
  <rect x="228" y="41" width="20" height="4" rx="2" fill="#3B82F6" opacity="0.7"/>
  <!-- Cell data -->
  <text x="160" y="65" text-anchor="middle" fill="#FF3B8B" font-family="monospace" font-size="9" opacity="0.6">$2.4k</text>
  <text x="200" y="65" text-anchor="middle" fill="#A855F7" font-family="monospace" font-size="9" opacity="0.6">$3.1k</text>
  <text x="240" y="65" text-anchor="middle" fill="#3B82F6" font-family="monospace" font-size="9" opacity="0.6">$4.8k</text>
  <!-- Highlighted cell with bolt -->
  <rect x="220" y="87" width="40" height="17" fill="url(#accent)" opacity="0.2" rx="2"/>
  <path d="M237 90 L233 97 L236 97 L234 103 L241 95 L237 95 Z" fill="white" opacity="0.8"/>
  <!-- Mini chart -->
  <polyline points="148,82 160,78 170,80 178,75" fill="none" stroke="#FF3B8B" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Particles -->
  <circle cx="115" cy="55" r="2.5" fill="#3B82F6" opacity="0.5"/>
  <circle cx="290" cy="65" r="2" fill="#FF3B8B" opacity="0.4"/>
  <circle cx="280" cy="110" r="2" fill="#A855F7" opacity="0.4"/>
  <!-- Divider -->
  <line x1="80" y1="155" x2="320" y2="155" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="180" text-anchor="middle" fill="white" font-family="'Poppins',-apple-system,sans-serif" font-size="16" font-weight="700" opacity="0.95">Spreadsheet Tools</text>
  <text x="200" y="205" text-anchor="middle" fill="#3B82F6" font-family="'Poppins',-apple-system,sans-serif" font-size="10" font-weight="600" letter-spacing="3" opacity="0.7">GIRL GONE AI</text>
</svg>