<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0a18"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3B8B"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <rect width="400" height="240" rx="16" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <!-- Workflow nodes -->
  <circle cx="150" cy="65" r="18" fill="none" stroke="#FF3B8B" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="250" cy="65" r="18" fill="none" stroke="#3B82F6" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="200" cy="115" r="20" fill="none" stroke="#A855F7" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Connecting lines with gradient feel -->
  <line x1="166" y1="74" x2="184" y2="100" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="234" y1="74" x2="216" y2="100" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="168" y1="65" x2="232" y2="65" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Play icon in first node -->
  <polygon points="145,58 145,72 157,65" fill="#FF3B8B" opacity="0.7"/>
  <!-- Gear in second node -->
  <circle cx="250" cy="65" r="7" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.7"/>
  <circle cx="250" cy="65" r="3" fill="#3B82F6" opacity="0.5"/>
  <!-- Lightning bolt in center node -->
  <path d="M203 108 L197 118 L201 118 L199 126 L207 116 L203 116 Z" fill="url(#accent)" filter="url(#glow)"/>
  <!-- Arrow indicators -->
  <polygon points="178,82 182,88 174,88" fill="#FF3B8B" opacity="0.5"/>
  <polygon points="222,82 226,88 218,88" fill="#3B82F6" opacity="0.5"/>
  <!-- Particles -->
  <circle cx="115" cy="100" r="2.5" fill="#FF3B8B" opacity="0.4"/>
  <circle cx="290" cy="95" r="2" fill="#3B82F6" opacity="0.4"/>
  <circle cx="200" cy="35" r="2" fill="#A855F7" opacity="0.5"/>
  <!-- Divider -->
  <line x1="80" y1="155" x2="320" y2="155" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="200" y="180" text-anchor="middle" fill="white" font-family="'Poppins',-apple-system,sans-serif" font-size="16" font-weight="700" opacity="0.95">Workflow Kits</text>
  <text x="200" y="205" text-anchor="middle" fill="#FF3B8B" font-family="'Poppins',-apple-system,sans-serif" font-size="10" font-weight="600" letter-spacing="3" opacity="0.7">GIRL GONE AI</text>
</svg>